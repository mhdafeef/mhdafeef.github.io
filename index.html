<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flip Profile</title>
	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
</head>
<body>
	<div class="card">
		<div id="card-inner">

<!-- Card front Start-->

			<div class="card-face card-face--front">
				<div class="top-line-1"></div> <div class="top-line-2"></div>
				<div class="card-content">
					<div class="card-header-front">
						<img src="pro-pic.svg" alt="" class="pp" />
						<h2>Mohamed Afeef</h2>
						<span>Graphics Designer</span>
					</div>
					<div class="card-body1">
						<div class="social-btns">
							<div class="fb-bg">
								<i class="fa fa-facebook-f"></i></div>
							
							<div class="icon-bg">
								<i class="fa fa-instagram"></i></div>
						</div>
						<div class="social-btns">
							<div class="icon-bg">
								<i class="fa fa-youtube-play"></i></div>
							
							<div class="icon-bg">
								<i class="fa fa-whatsapp"></i></div>

								<div class="icon-bg">
									<i class="fa fa-phone"></i></div>
							</div>
						<div class="f-pay-btn">
							<div class="f-pay-btn-bg">
								<button id="btn-front">Pay Now</button>
							</div>
						</div>

						<div class="f-bottom-slider">
<!-- Work stopped here -->
							</div>
					
					</div>
				</div>
			</div>
<!-- Card front End-->
<!-- Card back Start-->

			<div class="card-face card-face--back">
				<div class="top-line-1"></div> <div class="top-line-2"></div>
				<div class="card-content">
					<div class="card-header-back">
						<img src="pro-pic.svg" alt="" class="pp" />
						<h2>Mohamed Afeef</h2>
						<span>Graphics Designer</span>
					</div>
					<div class="card-body2">
						<h3>Payment</h3> <div class="sp-bg tooltip"> <p class="imp-note">&#8520;</p>
							<span class="tooltiptext">This is a payment link generator, not a payment gateway. This service is based on UPI payment.</span>
						</div> <p id="amo-value" class="amount-pre"></p>
					<div class="pay-form">
						<input class="user-input" type="number" id="amount" onkeyup="myFunction()" placeholder="₹199.00">
						<input class="user-input" type="text" id="name" placeholder="Remarks">
					</div>
					<div id="qrcode"></div>
						<div  class="actions">
							<div class="pay-btn">
							
							   <button class="paynow-btn" onClick="payNow()">Pay Now</button>
				
							</div>
						</div>

					<div class="btn-cont">
						<button id="btn-back">Back</button>
					</div>
					</div>
				</div>
			</div>

<!-- Card back End-->

		</div>
	</div>

	<script src="script.js"></script>
	
</body>
</html>
