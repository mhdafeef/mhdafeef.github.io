<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flip Profile</title>
	<link rel="stylesheet" href="main.css" />
</head>
<body>
	<div class="card">
		<div class="card-inner">

<!-- Card start Start-->

			<div class="card-face card-face--front">
				<div class="card-content">
					<div class="card-header-front">
						<img src="pro-pic.svg" alt="" class="pp" />
						<h2>Mohamed Afeef</h2>
						<span>Graphics Designer</span>
					</div>
					<div class="card-body1">
						<h3>JavaScript Wizard</h3>
						<p>Lorem ipsum <strong>dolor</strong> sit amet, consectetur <strong>adipiscing</strong> elit. Sed id erat a magna lobortis dictum. Nunc est arcu, <strong>lacinia</strong> quis sapien placerat, <strong>laoreet</strong> tincidunt nulla.</p>
					</div>
				</div>
			</div>
<!-- Card start End-->
<!-- Card back Start-->

			<div class="card-face card-face--back">
				<div class="card-content">
					<div class="card-header-back">
						<img src="pro-pic.svg" alt="" class="pp" />
						<h2>Mohamed Afeef</h2>
						<span>Graphics Designer</span>
					</div>
					<div class="card-body2">
						<h3>Payment</h3> <p class="amount-pre" value>199.00</p>
						<input class="" type="text" id="name" placeholder="Enter Name">
						<input type="number" id="amount" placeholder="Enter Amount">
						
					</div>
				</div>
			</div>

<!-- Card back End-->

		</div>
	</div>
	<script src="script.js"></script>
</body>
</html>
