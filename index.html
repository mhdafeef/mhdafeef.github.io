<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flip Profile</title>
	<link rel="stylesheet" href="style.css" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
</head>
<body>
	<div class="card">
		<div id="card-inner">

<!-- Card start Start-->

			<div class="card-face card-face--front">
				<div class="card-content">
					<div class="card-header-front">
						<img src="pro-pic.svg" alt="" class="pp" />
						<h2>Mohamed Afeef</h2>
						<span>Graphics Designer</span>
					</div>
					<div class="card-body1">
						<h3>JavaScript Wizard</h3>
						<p>Lorem ipsum <strong>dolor</strong> sit amet, consectetur <strong>adipiscing</strong> elit. Sed id erat a magna lobortis dictum. Nunc est arcu, <strong>lacinia</strong> quis sapien placerat, <strong>laoreet</strong> tincidunt nulla.</p>
					
					
						<button id="btn-front">Front</button>
					
					</div>
				</div>
			</div>
<!-- Card start End-->
<!-- Card back Start-->

			<div class="card-face card-face--back">
				<div class="card-content">
					<div class="card-header-back">
						<img src="pro-pic.svg" alt="" class="pp" />
						<h2>Mohamed Afeef</h2>
						<span>Graphics Designer</span>
					</div>
					<div class="card-body2">
						<h3>Payment</h3> <p id="amo-value" class="amount-pre"></p>
					<div class="pay-form">
						<input class="user-input" type="text" id="currency-field" name="currency-field" onkeyup="success()" pattern="^\$\d{1,3}(,\d{3})*(\.\d+)?$" value="" data-type="currency" placeholder="₹199.00">
						<input class="user-input" type="" id="name" onkeyup="success()" placeholder="Remarks">
					</div>
					
						<div  class="actions">
							<div class="pay-btn">
							
							   <!-- "upi://pay?pn=MOHAMED AFEEF&amp;pa=mhdafeef@ybl&amp;cu=INR&amp;am=100.0" -->
								<button class="paynow-btn" onClick="payNow()">Pay Now</button>
				
							</div>
						</div>

					<div class="btn-cont">
						<button id="btn-back">Back</button>
					</div>
					</div>
				</div>
			</div>

<!-- Card back End-->

		</div>
	</div>
	<script src="script.js"></script>
	
</body>
</html>
